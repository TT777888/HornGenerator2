<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Horn Generator</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#0c1016;
color:#111;
}

#app{
display:grid;
grid-template-columns:320px 1fr;
height:100vh;
}

.panel{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(20px);
padding:20px;
}

h1{
margin:0 0 10px 0;
font-size:24px;
}

.field{
margin-bottom:16px;
}

label{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:6px;
}

input[type=range]{
width:100%;
}

input[type=color]{
width:100%;
height:36px;
}

#viewer{
width:100%;
height:100%;
}

canvas{
width:100%;
height:100%;
display:block;
}

</style>
</head>

<body>

<div id="app">

<div class="panel">

<h1>Horn Generator</h1>

<div class="field">
<label>大きさ <span id="sizeV">5</span></label>
<input id="size" type="range" min="2" max="9" step="0.1" value="5">
</div>

<div class="field">
<label>曲り <span id="bendV">1</span></label>
<input id="bend" type="range" min="0.2" max="2" step="0.01" value="1">
</div>

<div class="field">
<label>節 <span id="textureV">0.2</span></label>
<input id="texture" type="range" min="0" max="1" step="0.01" value="0.2">
</div>

<div class="field">
<label>分岐 <span id="branchesV">3</span></label>
<input id="branches" type="range" min="1" max="5" step="1" value="3">
</div>

<div class="field">
<label>色</label>
<input id="color" type="color" value="#e7d9c8">
</div>

</div>

<div id="viewer"></div>

</div>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.160.0/build/three.module.js"
}
}
</script>

<script type="module">

import * as THREE from "three"

const viewer=document.getElementById("viewer")

const params={
size:5,
bend:1,
texture:0.2,
branches:3,
color:"#e7d9c8"
}

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
40,
viewer.clientWidth/viewer.clientHeight,
0.1,
100
)

camera.position.set(0,2.5,9)

const renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(viewer.clientWidth,viewer.clientHeight)

viewer.appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,1.4))

const light=new THREE.DirectionalLight(0xffffff,2)
light.position.set(5,7,5)
scene.add(light)

let hornGroup=new THREE.Group()
scene.add(hornGroup)

function plastic(color){

return new THREE.MeshPhysicalMaterial({

color:color,
roughness:0.25,
clearcoat:0.4,
clearcoatRoughness:0.2

})

}

function lerp(a,b,t){

return a+(b-a)*t

}

function tube(curve,opt){

const geo=new THREE.TubeGeometry(curve,80,opt.r1,24,false)

return new THREE.Mesh(geo,plastic(opt.color))

}

function mainCurve(){

const L=params.size
const B=params.bend

return new THREE.CatmullRomCurve3([

new THREE.Vector3(0,0,0),
new THREE.Vector3(B*0.2,L*0.3,0),
new THREE.Vector3(B*0.5,L*0.6,0.1),
new THREE.Vector3(B*0.7,L,0)

])

}

function branchCurve(base,i){

const p=base.getPointAt(0.3+0.2*i)

return new THREE.CatmullRomCurve3([

p,
p.clone().add(new THREE.Vector3(0.3+i*0.1,0.8,0)),
p.clone().add(new THREE.Vector3(0.5+i*0.2,1.4,0))

])

}

function build(){

scene.remove(hornGroup)

hornGroup=new THREE.Group()

const main=mainCurve()

hornGroup.add(tube(main,{
r1:0.17*(params.size/5),
color:params.color
}))

for(let i=0;i<params.branches;i++){

hornGroup.add(tube(branchCurve(main,i),{

r1:0.07*(params.size/5),
color:params.color

}))

}

hornGroup.position.y=-0.5

scene.add(hornGroup)

}

build()

function update(){

build()

}

size.oninput=e=>{

params.size=+e.target.value
sizeV.innerText=params.size.toFixed(1)
update()

}

bend.oninput=e=>{

params.bend=+e.target.value
bendV.innerText=params.bend.toFixed(2)
update()

}

texture.oninput=e=>{

params.texture=+e.target.value
textureV.innerText=params.texture.toFixed(2)
update()

}

branches.oninput=e=>{

params.branches=+e.target.value
branchesV.innerText=params.branches
update()

}

color.oninput=e=>{

params.color=e.target.value
update()

}

let drag=false
let lastX=0
let lastY=0

let targetX=0
let targetY=0

viewer.onpointerdown=e=>{

drag=true
lastX=e.clientX
lastY=e.clientY

}

window.onpointerup=()=>{

drag=false

}

window.onpointermove=e=>{

if(!drag)return

const dx=e.clientX-lastX
const dy=e.clientY-lastY

lastX=e.clientX
lastY=e.clientY

targetY+=dx*0.01
targetX+=dy*0.01

}

viewer.onwheel=e=>{

camera.position.z+=e.deltaY*0.01
camera.position.z=Math.max(5,Math.min(14,camera.position.z))

}

function animate(){

requestAnimationFrame(animate)

hornGroup.rotation.y+=
(targetY-hornGroup.rotation.y)*0.1

hornGroup.rotation.x+=
(targetX-hornGroup.rotation.x)*0.1

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
