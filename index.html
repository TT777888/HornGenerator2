<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horn Generator</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #0f1722;
      --bg2: #0a0f16;
      --panel: rgba(255,255,255,0.72);
      --panel-border: rgba(255,255,255,0.5);
      --text: #111318;
      --muted: #6b7280;
      --line: rgba(17,19,24,0.08);
      --accent: #2f6df6;
      --shadow: 0 20px 50px rgba(0,0,0,0.14);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, #1b2636 0%, var(--bg1) 35%, var(--bg2) 100%);
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-columns: 340px 1fr;
      width: 100%;
      height: 100vh;
    }

    .panel {
      margin: 18px;
      padding: 18px;
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      color: var(--text);
      overflow-y: auto;
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 8px 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .card {
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 22px;
      padding: 10px 14px;
    }

    .field {
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .field:last-child {
      border-bottom: none;
    }

    .field label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .field span {
      color: var(--muted);
      font-weight: 700;
      min-width: 44px;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    input[type="color"] {
      width: 100%;
      height: 44px;
      border: 1px solid rgba(17,19,24,0.08);
      border-radius: 14px;
      background: rgba(255,255,255,0.85);
      padding: 4px;
      cursor: pointer;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      height: 44px;
      border: none;
      border-radius: 14px;
      background: #111318;
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: rgba(255,255,255,0.8);
      color: var(--text);
      border: 1px solid rgba(17,19,24,0.08);
    }

    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    #viewer {
      position: relative;
      min-width: 0;
      cursor: grab;
    }

    #viewer.dragging {
      cursor: grabbing;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 900px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .panel {
        margin: 12px 12px 0;
      }

      #viewer {
        min-height: 58vh;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside class="panel">
      <h1>Horn Generator</h1>
      <div class="sub">鹿角っぽい、やわらかい分岐のツノを作る版です。</div>

      <div class="card">
        <div class="field">
          <label for="size">大きさ <span id="sizeValue">5.2</span></label>
          <input type="range" id="size" min="2" max="9" step="0.1" value="5.2" />
        </div>

        <div class="field">
          <label for="bend">曲がり <span id="bendValue">1.20</span></label>
          <input type="range" id="bend" min="0.2" max="2.5" step="0.01" value="1.2" />
        </div>

        <div class="field">
          <label for="spread">枝のひらき <span id="spreadValue">0.85</span></label>
          <input type="range" id="spread" min="0.2" max="1.6" step="0.01" value="0.85" />
        </div>

        <div class="field">
          <label for="branches">分岐数 <span id="branchesValue">3</span></label>
          <input type="range" id="branches" min="1" max="5" step="1" value="3" />
        </div>

        <div class="field">
          <label for="texture">節・凹凸 <span id="textureValue">0.28</span></label>
          <input type="range" id="texture" min="0" max="1" step="0.01" value="0.28" />
        </div>

        <div class="field">
          <label for="color">色</label>
          <input type="color" id="color" value="#d9c7ae" />
        </div>
      </div>

      <div class="actions">
        <button id="randomBtn">ランダム</button>
        <button id="resetBtn" class="secondary">リセット</button>
      </div>

      <div class="hint">
        ドラッグで回転、ホイールでズーム。<br>
        台座なし・タイプ選択なしです。
      </div>
    </aside>

    <main id="viewer"></main>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from "three";

    const viewer = document.getElementById("viewer");

    const params = {
      size: 5.2,
      bend: 1.2,
      spread: 0.85,
      branches: 3,
      texture: 0.28,
      color: "#d9c7ae"
    };

    const DEFAULTS = { ...params };

    const inputs = {
      size: document.getElementById("size"),
      bend: document.getElementById("bend"),
      spread: document.getElementById("spread"),
      branches: document.getElementById("branches"),
      texture: document.getElementById("texture"),
      color: document.getElementById("color")
    };

    const labels = {
      size: document.getElementById("sizeValue"),
      bend: document.getElementById("bendValue"),
      spread: document.getElementById("spreadValue"),
      branches: document.getElementById("branchesValue"),
      texture: document.getElementById("textureValue")
    };

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0a0f16, 10, 24);

    const camera = new THREE.PerspectiveCamera(
      38,
      Math.max(1, viewer.clientWidth) / Math.max(1, viewer.clientHeight),
      0.1,
      100
    );
    camera.position.set(0, 2.7, 9.5);
    camera.lookAt(0, 2.4, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(Math.max(1, viewer.clientWidth), Math.max(1, viewer.clientHeight));
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    viewer.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.25));

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.1);
    keyLight.position.set(4, 7, 6);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xd6e2ff, 0.7);
    fillLight.position.set(-5, 4, -3);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffecd8, 0.55);
    rimLight.position.set(0, 6, -7);
    scene.add(rimLight);

    const backPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshBasicMaterial({
        color: 0x10202a,
        transparent: true,
        opacity: 0.18
      })
    );
    backPlane.position.set(0, 4, -6);
    scene.add(backPlane);

    const softShadow = new THREE.Mesh(
      new THREE.CircleGeometry(2.2, 48),
      new THREE.MeshBasicMaterial({
        color: 0x000000,
        transparent: true,
        opacity: 0.10
      })
    );
    softShadow.rotation.x = -Math.PI / 2;
    softShadow.position.y = -0.75;
    scene.add(softShadow);

    let hornGroup = new THREE.Group();
    scene.add(hornGroup);

    function updateLabels() {
      labels.size.textContent = Number(params.size).toFixed(1);
      labels.bend.textContent = Number(params.bend).toFixed(2);
      labels.spread.textContent = Number(params.spread).toFixed(2);
      labels.branches.textContent = params.branches;
      labels.texture.textContent = Number(params.texture).toFixed(2);
    }

    function syncInputs() {
      inputs.size.value = params.size;
      inputs.bend.value = params.bend;
      inputs.spread.value = params.spread;
      inputs.branches.value = params.branches;
      inputs.texture.value = params.texture;
      inputs.color.value = params.color;
      updateLabels();
    }

    function clearGroup(group) {
      while (group.children.length > 0) {
        const child = group.children[0];
        group.remove(child);
        child.traverse?.((obj) => {
          if (obj.geometry) obj.geometry.dispose();
          if (obj.material) {
            if (Array.isArray(obj.material)) obj.material.forEach((m) => m.dispose());
            else obj.material.dispose();
          }
        });
      }
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function hornMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness: 0.88,
        metalness: 0.02
      });
    }

    function buildTubeFromCurve(curve, {
      baseRadius,
      tipRadius,
      texture,
      color,
      radialSegments = 20,
      heightSegments = 72
    }) {
      const frames = curve.computeFrenetFrames(heightSegments, false);
      const positions = [];
      const normals = [];
      const uvs = [];
      const indices = [];

      const ridgeCount = Math.round(3 + texture * 10);
      const ridgeStrength = texture * 0.10;

      for (let i = 0; i <= heightSegments; i++) {
        const t = i / heightSegments;
        const center = curve.getPointAt(t);
        const normal = frames.normals[i];
        const binormal = frames.binormals[i];

        let radius = lerp(baseRadius, tipRadius, t);
        radius *= 1 + Math.sin(t * Math.PI * 2 * ridgeCount) * ridgeStrength;
        radius = Math.max(radius, 0.003);

        for (let j = 0; j <= radialSegments; j++) {
          const v = j / radialSegments;
          const angle = v * Math.PI * 2;

          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;

          const vertex = new THREE.Vector3()
            .copy(center)
            .addScaledVector(normal, x)
            .addScaledVector(binormal, y);

          positions.push(vertex.x, vertex.y, vertex.z);

          const n = new THREE.Vector3()
            .addScaledVector(normal, x)
            .addScaledVector(binormal, y)
            .normalize();

          normals.push(n.x, n.y, n.z);
          uvs.push(v, t);
        }
      }

      for (let i = 0; i < heightSegments; i++) {
        for (let j = 0; j < radialSegments; j++) {
          const a = i * (radialSegments + 1) + j;
          const b = a + radialSegments + 1;
          const c = b + 1;
          const d = a + 1;
          indices.push(a, b, d, b, c, d);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setIndex(indices);
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute("normal", new THREE.Float32BufferAttribute(normals, 3));
      geometry.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
      geometry.computeVertexNormals();

      const mesh = new THREE.Mesh(geometry, hornMaterial(color));
      return mesh;
    }

    function createMainCurve() {
      const L = params.size;
      const B = params.bend;

      return new THREE.CatmullRomCurve3(
        [
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(B * 0.12, L * 0.18, 0.05),
          new THREE.Vector3(B * 0.28, L * 0.42, 0.08),
          new THREE.Vector3(B * 0.45, L * 0.68, 0.10),
          new THREE.Vector3(B * 0.62, L * 0.90, 0.06),
          new THREE.Vector3(B * 0.72, L * 1.08, 0.00)
        ],
        false,
        "catmullrom",
        0.42
      );
    }

    function getFrameAt(curve, t) {
      const point = curve.getPointAt(t);
      const tangent = curve.getTangentAt(t).normalize();
      const frames = curve.computeFrenetFrames(100, false);
      const idx = Math.min(100, Math.floor(t * 100));
      return {
        point,
        tangent,
        normal: frames.normals[idx],
        binormal: frames.binormals[idx]
      };
    }

    function createBranchCurve(mainCurve, index, total) {
      const t = 0.26 + index * (0.48 / Math.max(1, total - 1));
      const { point, tangent, normal } = getFrameAt(mainCurve, t);

      const len = params.size * (0.22 + index * 0.07);
      const spread = params.spread * (0.55 + index * 0.18);

      const up = new THREE.Vector3(0, 1, 0);
      const dir = new THREE.Vector3()
        .copy(tangent)
        .multiplyScalar(0.30)
        .addScaledVector(normal, spread * 0.55)
        .addScaledVector(up, 0.95)
        .normalize();

      const p0 = point.clone();
      const p1 = point.clone().add(dir.clone().multiplyScalar(len * 0.24));
      const p2 = point.clone().add(dir.clone().multiplyScalar(len * 0.62));
      const p3 = point.clone().add(dir.clone().multiplyScalar(len));

      p1.x += spread * 0.10;
      p2.x += spread * 0.22;
      p3.x += spread * 0.30;

      return new THREE.CatmullRomCurve3([p0, p1, p2, p3], false, "catmullrom", 0.45);
    }

    function buildAntler() {
      const group = new THREE.Group();

      const mainCurve = createMainCurve();
      const mainHorn = buildTubeFromCurve(mainCurve, {
        baseRadius: 0.17 * (params.size / 5),
        tipRadius: 0.028,
        texture: params.texture,
        color: params.color,
        radialSegments: 22,
        heightSegments: 90
      });
      group.add(mainHorn);

      for (let i = 0; i < params.branches; i++) {
        const branchCurve = createBranchCurve(mainCurve, i, params.branches);
        const branch = buildTubeFromCurve(branchCurve, {
          baseRadius: 0.08 * (params.size / 5) * (1 - i * 0.08),
          tipRadius: 0.018,
          texture: params.texture * 0.6,
          color: params.color,
          radialSegments: 16,
          heightSegments: 44
        });
        group.add(branch);
      }

      group.position.y = -0.4;
      group.rotation.z = -0.10;

      return group;
    }

    function updateHorn() {
      scene.remove(hornGroup);
      clearGroup(hornGroup);
      hornGroup = buildAntler();
      scene.add(hornGroup);
    }

    function randomColor() {
      const colors = ["#e8d8c3", "#d9c7ae", "#c4a98d", "#efe5d8", "#b88d6c"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function randomize() {
      params.size = THREE.MathUtils.randFloat(3.5, 7.5);
      params.bend = THREE.MathUtils.randFloat(0.5, 2.0);
      params.spread = THREE.MathUtils.randFloat(0.35, 1.35);
      params.branches = THREE.MathUtils.randInt(2, 5);
      params.texture = THREE.MathUtils.randFloat(0.05, 0.6);
      params.color = randomColor();
      syncInputs();
      updateHorn();
    }

    function resetAll() {
      Object.assign(params, DEFAULTS);
      syncInputs();
      updateHorn();
    }

    inputs.size.addEventListener("input", (e) => {
      params.size = Number(e.target.value);
      updateLabels();
      updateHorn();
    });

    inputs.bend.addEventListener("input", (e) => {
      params.bend = Number(e.target.value);
      updateLabels();
      updateHorn();
    });

    inputs.spread.addEventListener("input", (e) => {
      params.spread = Number(e.target.value);
      updateLabels();
      updateHorn();
    });

    inputs.branches.addEventListener("input", (e) => {
      params.branches = Number(e.target.value);
      updateLabels();
      updateHorn();
    });

    inputs.texture.addEventListener("input", (e) => {
      params.texture = Number(e.target.value);
      updateLabels();
      updateHorn();
    });

    inputs.color.addEventListener("input", (e) => {
      params.color = e.target.value;
      updateHorn();
    });

    document.getElementById("randomBtn").addEventListener("click", randomize);
    document.getElementById("resetBtn").addEventListener("click", resetAll);

    // モデル回転
    let isDragging = false;
    let prevX = 0;
    let prevY = 0;
    let rotY = -0.35;
    let rotX = 0.08;
    let targetZoom = camera.position.z;

    viewer.addEventListener("pointerdown", (e) => {
      isDragging = true;
      prevX = e.clientX;
      prevY = e.clientY;
      viewer.classList.add("dragging");
    });

    window.addEventListener("pointerup", () => {
      isDragging = false;
      viewer.classList.remove("dragging");
    });

    window.addEventListener("pointermove", (e) => {
      if (!isDragging) return;

      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;
      prevX = e.clientX;
      prevY = e.clientY;

      rotY += dx * 0.008;
      rotX += dy * 0.005;
      rotX = Math.max(-0.5, Math.min(0.5, rotX));
    });

    viewer.addEventListener("wheel", (e) => {
      e.preventDefault();
      targetZoom += e.deltaY * 0.01;
      targetZoom = Math.max(5.5, Math.min(14, targetZoom));
    }, { passive: false });

    syncInputs();
    updateHorn();

    window.addEventListener("resize", () => {
      const width = Math.max(1, viewer.clientWidth);
      const height = Math.max(1, viewer.clientHeight);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    function animate() {
      requestAnimationFrame(animate);

      hornGroup.rotation.y += (rotY - hornGroup.rotation.y) * 0.12;
      hornGroup.rotation.x += (rotX - hornGroup.rotation.x) * 0.12;

      camera.position.z += (targetZoom - camera.position.z) * 0.08;
      camera.lookAt(0, 2.4, 0);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
