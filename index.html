<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Advanced Bio-Horn: Discrete Stack Edition</title>
    <style>
        :root { --accent: #d4a373; --bg: #05070a; --panel: #12151c; }
        body { margin: 0; font-family: 'Georgia', serif; background: var(--bg); color: #fff; overflow: hidden; }
        #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        
        /* 画面1: 設定パネル */
        .panel { 
            background: var(--panel); 
            padding: 25px; 
            border-right: 1px solid #222;
            overflow-y: auto;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        h1 { font-size: 1.1rem; letter-spacing: 2px; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px; text-align: center; }
        .control-group { margin-bottom: 25px; }
        label { font-size: 0.75rem; color: #aaa; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .level-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: #444; margin-top: 5px; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        input[type=color] { width: 100%; height: 35px; border: 1px solid #333; background: none; cursor: pointer; border-radius: 2px; }
        
        #generate { 
            width: 100%; padding: 12px; background: var(--accent); color: #111; 
            border: none; border-radius: 2px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        #generate:active { transform: scale(0.98); }

        /* 画面2: ビューア */
        #viewer { width: 100%; height: 100%; position: relative; }
        .info { position: absolute; top: 20px; right: 20px; font-size: 0.7rem; color: #666; text-align: right; pointer-events: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="panel">
        <h1>HORN GEN v3</h1>
        
        <div class="control-group">
            <label>長さ (SIZE) <b id="val-size">3</b></label>
            <input id="size" type="range" min="1" max="5" step="1" value="3">
            <div class="level-labels"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
        </div>

        <div class="control-group">
            <label>曲がり (CURVE) <b id="val-bend">3</b></label>
            <input id="bend" type="range" min="1" max="5" step="1" value="3">
            <div class="level-labels"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
        </div>

        <div class="control-group">
            <label>節 (TEXTURE) <b id="val-texture">3</b></label>
            <input id="texture" type="range" min="1" max="5" step="1" value="3">
            <div class="level-labels"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
        </div>

        <div class="control-group">
            <label>分岐 (BRANCHES) < b id="val-branches">1</b></label>
            <input id="branches" type="range" min="1" max="5" step="1" value="1">
            <div class="level-labels"><span>NONE</span><span>MANY</span></div>
        </div>

        <div class="control-group">
            <label>色 (BASE COLOR)</label>
            <input id="color" type="color" value="#8b7355">
        </div>

        <button id="generate">DNAを再生成</button>
    </div>

    <div id="viewer">
        <div class="info">DISCRETE STACKING ENGINE<br>360° FREE VIEW</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const viewer = document.getElementById("viewer");
let settings = { size: 3, bend: 3, texture: 3, branches: 1, color: "#8b7355" };

// --- Three.js Setup ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
camera.position.set(8, 5, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(viewer.clientWidth, viewer.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
viewer.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0xffffff, 2);
pointLight.position.set(-10, -5, -10);
scene.add(pointLight);

const hornGroup = new THREE.Group();
scene.add(hornGroup);

// --- 輪切り積み上げエンジン ---
function createOrganicHorn(isBranch = false, startPos = new THREE.Vector3(), direction = new THREE.Vector3(0,1,0), scale = 1.0) {
    const hornParts = new THREE.Group();
    
    const sizeLvl = settings.size;
    const bendLvl = settings.bend;
    const texLvl = settings.texture;
    
    const numDiscs = 40 + (sizeLvl * 15); // 積み上げる枚数
    const baseRadius = (isBranch ? 0.1 : 0.4) * (sizeLvl * 0.2 + 0.5) * scale;
    
    let currentPos = startPos.clone();
    let currentDir = direction.clone().normalize();
    
    // 質感を出すためのマテリアル
    const material = new THREE.MeshPhysicalMaterial({
        color: settings.color,
        roughness: 0.7,
        metalness: 0.1,
        flatShading: false
    });

    for (let i = 0; i < numDiscs; i++) {
        const t = i / numDiscs;
        
        // 1. 半径の計算（先細り + 節の凹凸）
        const taper = Math.pow(1 - t, 0.8);
        const bump = 1 + Math.sin(t * (10 + texLvl * 5)) * (texLvl * 0.04) * (1 - t);
        const r = Math.max(0.01, baseRadius * taper * bump);
        
        // 2. ディスク（円柱の非常に薄いもの）の生成
        const thickness = 0.1 + (Math.random() * 0.05); // 厚みの個体差
        const discGeo = new THREE.CylinderGeometry(r * 0.95, r, thickness, 16);
        const disc = new THREE.Mesh(discGeo, material);
        
        // 3. 位置と回転の決定
        disc.position.copy(currentPos);
        
        // 方向ベクトルをクォータニオンに変換してディスクを向ける
        const quaternion = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), currentDir);
        disc.quaternion.copy(quaternion);
        
        // わずかなランダムな傾き（個体差）
        disc.rotation.x += (Math.random() - 0.5) * 0.1;
        disc.rotation.z += (Math.random() - 0.5) * 0.1;

        hornParts.add(disc);

        // 4. 次のディスクの位置を計算（曲がり具合）
        const bendStrength = (bendLvl * 0.02) + (Math.random() * 0.01);
        const upVec = new THREE.Vector3(1, 0.2, 0).applyQuaternion(quaternion).multiplyScalar(bendStrength);
        
        currentDir.add(upVec).normalize();
        currentPos.add(currentDir.clone().multiplyScalar(thickness * 0.8)); // 80%重ねることで密度を出す
    }

    return { group: hornParts, endPos: currentPos, midPos: (idx) => hornParts.children[idx].position };
}

function build() {
    // クリア
    while(hornGroup.children.length > 0) {
        const c = hornGroup.children[0];
        c.traverse(child => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
        });
        hornGroup.remove(c);
    }

    // メインの角
    const main = createOrganicOrganicHorn(false, new THREE.Vector3(0,0,0), new THREE.Vector3(0.1, 1, 0));
    hornGroup.add(main.group);

    // 分岐
    const branchCount = settings.branches - 1;
    for (let i = 0; i < branchCount; i++) {
        // メインのディスクのどこかから生やす
        const attachIdx = Math.floor(15 + Math.random() * 20);
        if (main.group.children[attachIdx]) {
            const startP = main.group.children[attachIdx].position;
            const branch = createOrganicOrganicHorn(true, startP, new THREE.Vector3(1, 0.5, (Math.random()-0.5)), 0.6);
            hornGroup.add(branch.group);
        }
    }

    // センタリング
    const box = new THREE.Box3().setFromObject(hornGroup);
    const center = box.getCenter(new THREE.Vector3());
    hornGroup.position.y = -center.y;
}

// 別名で定義して重複を避ける（リロード対策）
const createOrganicOrganicHorn = createOrganicHorn;

// UI
['size', 'bend', 'texture', 'branches'].forEach(id => {
    document.getElementById(id).oninput = (e) => {
        settings[id] = parseInt(e.target.value);
        document.getElementById(`val-${id}`).innerText = settings[id];
        build();
    };
});
document.getElementById('color').oninput = (e) => {
    settings.color = e.target.value;
    build();
};
document.getElementById('generate').onclick = () => build();

window.addEventListener('resize', () => {
    camera.aspect = viewer.clientWidth / viewer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
});

build();
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
