<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Realistic Horn Generator - Advanced</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0c1016; color: #eee; overflow: hidden; }
        #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .panel { 
            background: rgba(20, 25, 35, 0.95); 
            padding: 25px; 
            border-right: 1px solid #333;
            z-index: 10;
            overflow-y: auto;
        }
        h1 { margin: 0 0 20px 0; font-size: 20px; letter-spacing: 2px; color: #e7d9c8; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .field { margin-bottom: 20px; }
        label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: #aaa; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #e7d9c8; }
        input[type=color] { width: 100%; height: 30px; border: 1px solid #444; background: none; cursor: pointer; }
        #viewer { width: 100%; height: 100%; position: relative; }
        .hint { font-size: 11px; color: #666; margin-top: 15px; line-height: 1.5; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="app">
    <div class="panel">
        <h1>HORN GEN</h1>
        <div class="field">
            <label>長さ (Size) <span id="sizeV">2.5</span></label>
            <input id="size" type="range" min="1" max="10" step="0.1" value="2.5">
        </div>
        <div class="field">
            <label>曲がり (Curve) <span id="bendV">1.0</span></label>
            <input id="bend" type="range" min="0" max="4" step="0.05" value="1.0">
        </div>
        <div class="field">
            <label>節の深さ (Texture) <span id="textureV">0.2</span></label>
            <input id="texture" type="range" min="0" max="1" step="0.01" value="0.2">
        </div>
        <div class="field">
            <label>分岐数 (Branches) <span id="branchesV">2</span></label>
            <input id="branches" type="range" min="0" max="6" step="1" value="2">
        </div>
        <div class="field">
            <label>色 (Base Color)</label>
            <input id="color" type="color" value="#ffffff">
        </div>
        <div class="hint">
            ・左ドラッグ: 回転 / 右ドラッグ: 平行移動<br>
            ・ホイール: 高速ズーム<br>
            ・<b>分岐は節に合わせてランダム配置されます</b>
        </div>
    </div>
    <div id="viewer"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const viewer = document.getElementById("viewer");
const params = { size: 2.5, bend: 1.0, texture: 0.2, branches: 2, color: "#ffffff" };

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c1016);
const camera = new THREE.PerspectiveCamera(40, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
camera.position.set(0, 2, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(viewer.clientWidth, viewer.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
// 深度バッファをより正確に
renderer.capabilities.logarithmicDepthBuffer = true;
viewer.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.zoomSpeed = 2.0; 

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light1 = new THREE.DirectionalLight(0xffffff, 1.5);
light1.position.set(10, 10, 10);
scene.add(light1);

const hornGroup = new THREE.Group();
scene.add(hornGroup);

// --- ユーティリティ: パラメータに基づく擬似ランダム ---
function pseudoRandom(seed) {
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function createTaperedHorn(curve, baseRadius, isBranch = false) {
    const segments = 100;
    const radialSegments = 24;
    const vertices = [];
    const indices = [];
    const frames = curve.computeFrenetFrames(segments, false);

    for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        let taper = Math.pow(1 - t, 0.9);
        
        // 分岐の場合、根元（t=0）を少し太くしてメインにめり込ませる
        if(isBranch && t < 0.1) {
            taper *= (1.2 - t); 
        }

        const bump = 1 + Math.sin(t * 30) * (params.texture * 0.12) * (1 - t);
        const r = baseRadius * taper * bump;

        const p = curve.getPointAt(t);
        const n = frames.normals[i];
        const b = frames.binormals[i];

        for (let j = 0; j <= radialSegments; j++) {
            const theta = (j / radialSegments) * Math.PI * 2;
            const v = new THREE.Vector3().copy(p)
                .add(n.clone().multiplyScalar(Math.cos(theta) * r))
                .add(b.clone().multiplyScalar(Math.sin(theta) * r));
            vertices.push(v.x, v.y, v.z);
        }
    }

    for (let i = 0; i < segments; i++) {
        for (let j = 0; j < radialSegments; j++) {
            const a = i * (radialSegments + 1) + j;
            const b = (i + 1) * (radialSegments + 1) + j;
            const c = (i + 1) * (radialSegments + 1) + (j + 1);
            const d = i * (radialSegments + 1) + (j + 1);
            indices.push(a, b, d, b, c, d);
        }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    const mat = new THREE.MeshPhysicalMaterial({
        color: params.color,
        roughness: 0.65,
        metalness: 0.05,
        transparent: false, // 透明度を無効化して透けを防止
        depthTest: true,
        depthWrite: true
    });

    return new THREE.Mesh(geo, mat);
}

function build() {
    while(hornGroup.children.length > 0) {
        const child = hornGroup.children[0];
        child.geometry.dispose();
        child.material.dispose();
        hornGroup.remove(child);
    }

    const L = params.size;
    const B = params.bend;

    const mainCurve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(B * 0.4, L * 0.3, B * 0.1),
        new THREE.Vector3(B * 1.2, L * 0.7, B * 0.5),
        new THREE.Vector3(B * 1.5, L, 0)
    ]);

    const mainRadius = 0.25 * (L/10 + 0.7);
    hornGroup.add(createTaperedHorn(mainCurve, mainRadius));

    // --- ランダムな分岐 ---
    for (let i = 0; i < params.branches; i++) {
        // パラメータに基づいたシード値で分岐位置を決定
        const seed = i + L + B;
        const t = 0.2 + pseudoRandom(seed) * 0.6; // 0.2〜0.8の間にランダム配置
        
        const startP = mainCurve.getPointAt(t);
        // メインの角の「中」から生えるように、法線方向に少し戻す
        const frames = mainCurve.computeFrenetFrames(100, false);
        const frameIdx = Math.floor(t * 100);
        const innerDir = frames.normals[frameIdx].clone().negate().multiplyScalar(mainRadius * 0.5);
        const deepStartP = startP.clone().add(innerDir);

        const branchCurve = new THREE.CatmullRomCurve3([
            deepStartP,
            startP.clone().add(new THREE.Vector3(
                (pseudoRandom(seed + 1) - 0.5) * 2 + B, 
                L * 0.2, 
                (pseudoRandom(seed + 2) - 0.5) * 2
            )),
            startP.clone().add(new THREE.Vector3(
                (pseudoRandom(seed + 3) * 2) + B, 
                L * 0.4, 
                (pseudoRandom(seed + 4) - 0.5) * 3
            ))
        ]);
        
        hornGroup.add(createTaperedHorn(branchCurve, mainRadius * 0.5, true));
    }

    hornGroup.position.y = -(L * 0.5);
    hornGroup.position.x = -(B * 0.5); 
}

const inputs = ['size', 'bend', 'texture', 'branches'];
inputs.forEach(id => {
    document.getElementById(id).oninput = (e) => {
        params[id] = parseFloat(e.target.value);
        document.getElementById(id + 'V').innerText = params[id].toFixed(id === 'branches' ? 0 : 1);
        build();
    };
});
document.getElementById('color').oninput = (e) => {
    params.color = e.target.value;
    build();
};

window.addEventListener('resize', () => {
    camera.aspect = viewer.clientWidth / viewer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
});

build();
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
