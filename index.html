<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Smooth Bio-Tube Horn Generator</title>
    <style>
        :root { --accent: #c5a880; --bg: #0d1117; --panel: #161b22; }
        body { margin: 0; font-family: 'Saws-serif', sans-serif; background: var(--bg); color: #fff; overflow: hidden; }
        #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        
        .panel { 
            background: var(--panel); 
            padding: 25px; 
            border-right: 1px solid #30363d;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h1 { font-size: 1rem; letter-spacing: 3px; color: var(--accent); border-bottom: 1px solid #30363d; padding-bottom: 10px; margin: 0; }
        .control-group { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; border: 1px solid #30363d; }
        label { font-size: 0.75rem; color: #8b949e; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .level-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: #484f58; margin-top: 5px; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        input[type=color] { width: 100%; height: 35px; border: 1px solid #30363d; background: none; cursor: pointer; border-radius: 4px; }
        
        button#generate { 
            padding: 15px; background: var(--accent); color: #0d1117; border: none; 
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.85rem; transition: 0.2s;
        }
        button#generate:hover { background: #dcc29d; transform: translateY(-1px); }

        #viewer { width: 100%; height: 100%; position: relative; }
        .hud { position: absolute; bottom: 20px; right: 20px; text-align: right; color: #484f58; font-size: 0.7rem; pointer-events: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="panel">
        <h1>SMOOTH HORN</h1>
        
        <div class="control-group">
            <label>長さ (SIZE) <b id="val-size">3</b></label>
            <input id="size" type="range" min="1" max="5" step="1" value="3">
            <div class="level-labels"><span>MIN</span><span>MID</span><span>MAX</span></div>
        </div>

        <div class="control-group">
            <label>強烈な曲がり (CURVE) <b id="val-bend">3</b></label>
            <input id="bend" type="range" min="1" max="5" step="1" value="3">
            <div class="level-labels"><span>GENTLE</span><span>WILD</span><span>SPIRAL</span></div>
        </div>

        <div class="control-group">
            <label>表面のうねり (WAVE) <b id="val-texture">3</b></label>
            <input id="texture" type="range" min="1" max="5" step="1" value="3">
            <div class="level-labels"><span>SILK</span><span>ORGANIC</span><span>VEIN</span></div>
        </div>

        <div class="control-group">
            <label>分岐 (BRANCHES) <b id="val-branches">1</b></label>
            <input id="branches" type="range" min="1" max="5" step="1" value="1">
            <div class="level-labels"><span>NONE</span><span>MANY</span></div>
        </div>

        <div class="control-group">
            <label>基本色</label>
            <input id="color" type="color" value="#a68b6a">
        </div>

        <button id="generate">個体DNAを再生成</button>
    </div>

    <div id="viewer">
        <div class="hud">SMOOTH TUBE ENGINE v5<br>PROCEDURAL SPLINE INTERPOLATION</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const viewer = document.getElementById("viewer");
let settings = { size: 3, bend: 3, texture: 3, branches: 1, color: "#a68b6a" };
let currentDNA = generateDNA();

function generateDNA() {
    return {
        seedX: Math.random() * 10,
        seedZ: Math.random() * 10,
        spiralFactor: (Math.random() - 0.5) * 2,
        wobble: Math.random()
    };
}

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
const camera = new THREE.PerspectiveCamera(40, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
camera.position.set(12, 10, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(viewer.clientWidth, viewer.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
viewer.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const topLight = new THREE.SpotLight(0xffffff, 200);
topLight.position.set(10, 20, 10);
scene.add(topLight);
const rimLight = new THREE.PointLight(0xffffff, 100);
rimLight.position.set(-10, -5, -10);
scene.add(rimLight);

const hornGroup = new THREE.Group();
scene.add(hornGroup);

// --- Smooth Tube Logic ---
function createSmoothHorn(isBranch = false, startPos = new THREE.Vector3(), customScale = 1.0) {
    const points = [];
    const segments = 100;
    const sizeLvl = settings.size;
    const bendLvl = settings.bend;
    const waveLvl = settings.texture;
    
    const length = sizeLvl * 1.8 * customScale;
    const bendStrength = bendLvl * 0.8;

    // 1. 背骨（スプライン曲線）の生成
    for (let i = 0; i <= 10; i++) {
        const t = i / 10;
        const x = Math.sin(t * Math.PI * (bendLvl * 0.4) + currentDNA.seedX) * bendStrength * t;
        const y = t * length;
        const z = Math.cos(t * Math.PI * (bendLvl * 0.4) + currentDNA.seedZ) * bendStrength * t;
        
        const p = new THREE.Vector3(x, y, z);
        if (isBranch) p.add(startPos);
        points.push(p);
    }
    const curve = new THREE.CatmullRomCurve3(points);

    // 2. カスタム半径（テーパーと表面のうねり）
    const baseRadius = (isBranch ? 0.2 : 0.5) * (sizeLvl * 0.15 + 0.6);
    
    const geometry = new THREE.TubeGeometry(curve, segments, baseRadius, 20, false);
    
    // 半径を位置によって変えるために頂点を操作
    const vertices = geometry.attributes.position;
    const tubePoints = geometry.parameters.path.getPoints(segments);
    const normals = geometry.binormals; // TubeGeometryはbinormals等を持っている

    for (let i = 0; i < vertices.count; i++) {
        const tIdx = Math.floor(i / (geometry.parameters.radialSegments + 1));
        const t = tIdx / segments;
        
        // テーパー（先端を細く）
        const taper = Math.pow(1 - t, 0.9);
        // 表面の滑らかなうねり
        const wave = 1 + Math.sin(t * 20 + currentDNA.wobble * 5) * (waveLvl * 0.03);
        
        // 頂点の再配置（中心からの距離を調整）
        const vertex = new THREE.Vector3().fromBufferAttribute(vertices, i);
        const center = tubePoints[tIdx];
        const dir = new THREE.Vector3().subVectors(vertex, center).normalize();
        
        const newRadius = baseRadius * taper * wave;
        vertex.copy(center).add(dir.multiplyScalar(newRadius));
        vertices.setXYZ(i, vertex.x, vertex.y, vertex.z);
    }
    
    geometry.computeVertexNormals();

    const material = new THREE.MeshPhysicalMaterial({
        color: settings.color,
        roughness: 0.35, // 滑らかさを強調
        metalness: 0.1,
        clearcoat: 0.2
    });

    return { mesh: new THREE.Mesh(geometry, material), curve: curve };
}

function build() {
    while(hornGroup.children.length > 0) {
        const child = hornGroup.children[0];
        child.geometry.dispose();
        child.material.dispose();
        hornGroup.remove(child);
    }

    const main = createSmoothHorn();
    hornGroup.add(main.mesh);

    const branchCount = settings.branches - 1;
    for (let i = 0; i < branchCount; i++) {
        const t = 0.3 + (i * 0.15);
        const spawnPos = main.curve.getPointAt(t);
        const branch = createSmoothHorn(true, spawnPos, 0.5);
        hornGroup.add(branch.mesh);
    }

    const box = new THREE.Box3().setFromObject(hornGroup);
    const center = box.getCenter(new THREE.Vector3());
    hornGroup.position.set(-center.x, -center.y, -center.z);
}

['size', 'bend', 'texture', 'branches'].forEach(id => {
    document.getElementById(id).oninput = (e) => {
        settings[id] = parseInt(e.target.value);
        document.getElementById(`val-${id}`).innerText = settings[id];
        build();
    };
});

document.getElementById('color').oninput = (e) => {
    settings.color = e.target.value;
    build();
};

document.getElementById('generate').onclick = () => {
    currentDNA = generateDNA();
    build();
};

window.addEventListener('resize', () => {
    camera.aspect = viewer.clientWidth / viewer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
});

build();
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
