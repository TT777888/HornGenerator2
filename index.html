<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Horn Generator - Ultimate Solid Edition</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1f26; color: #eee; overflow: hidden; }
        #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .panel { 
            background: rgba(25, 30, 40, 0.98); 
            padding: 25px; 
            border-right: 1px solid #444;
            z-index: 10;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        h1 { margin: 0 0 20px 0; font-size: 18px; letter-spacing: 2px; color: #e7d9c8; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .field { margin-bottom: 22px; }
        label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #bbb; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #e7d9c8; }
        input[type=color] { width: 100%; height: 35px; border: 1px solid #555; background: none; cursor: pointer; border-radius: 4px; }
        #viewer { width: 100%; height: 100%; position: relative; }
        .axes-label { position: absolute; bottom: 15px; right: 15px; color: #888; font-size: 11px; pointer-events: none; background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 15px; }
    </style>
</head>
<body>

<div id="app">
    <div class="panel">
        <h1>HORN GEN</h1>
        
        <div class="field">
            <label>長さ (Size) <span id="sizeV">2.5</span></label>
            <input id="size" type="range" min="1" max="10" step="0.1" value="2.5">
        </div>

        <div class="field">
            <label>曲がり (Curve) <span id="bendV">1.0</span></label>
            <input id="bend" type="range" min="0" max="4" step="0.05" value="1.0">
        </div>

        <div class="field">
            <label>節の深さ (Texture) <span id="textureV">0.2</span></label>
            <input id="texture" type="range" min="0" max="1" step="0.01" value="0.2">
        </div>

        <div class="field">
            <label>分岐数 (Branches) <span id="branchesV">2</span></label>
            <input id="branches" type="range" min="0" max="6" step="1" value="2">
        </div>

        <div class="field">
            <label>色 (Base Color)</label>
            <input id="color" type="color" value="#ffffff">
        </div>
    </div>
    <div id="viewer">
        <div class="axes-label">X:Red / Y:Green / Z:Blue</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const viewer = document.getElementById("viewer");
const params = { size: 2.5, bend: 1.0, texture: 0.2, branches: 2, color: "#ffffff" };

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1f26);

const camera = new THREE.PerspectiveCamera(40, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
camera.position.set(5, 4, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(viewer.clientWidth, viewer.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.8; 
viewer.appendChild(renderer.domElement);

// --- Axis Helper ---
const axesHelper = new THREE.AxesHelper(3);
scene.add(axesHelper);

// --- Controls (Full 360) ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minPolarAngle = 0; 
controls.maxPolarAngle = Math.PI; 

// --- Strong Lights ---
scene.add(new THREE.AmbientLight(0xffffff, 1.4)); 
const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
mainLight.position.set(10, 20, 10);
scene.add(mainLight);
const rimLight = new THREE.PointLight(0xffffff, 4);
rimLight.position.set(-10, 5, -10);
scene.add(rimLight);

const hornGroup = new THREE.Group();
scene.add(hornGroup);

function pseudoRandom(seed) {
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

// 蓋付きソリッドモデル生成
function createSolidHorn(curve, baseRadius, isBranch = false) {
    const segments = 80;
    const radialSegments = 24;
    const vertices = [];
    const indices = [];
    const frames = curve.computeFrenetFrames(segments, false);

    for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        let taper = Math.pow(1 - t, 0.95);
        if(isBranch && t < 0.1) taper *= (1.1 - t); 
        const bump = 1 + Math.sin(t * 30) * (params.texture * 0.1) * (1 - t);
        const r = Math.max(0.001, baseRadius * taper * bump); 

        const p = curve.getPointAt(t);
        const n = frames.normals[i];
        const b = frames.binormals[i];

        for (let j = 0; j <= radialSegments; j++) {
            const theta = (j / radialSegments) * Math.PI * 2;
            const v = new THREE.Vector3().copy(p)
                .add(n.clone().multiplyScalar(Math.cos(theta) * r))
                .add(b.clone().multiplyScalar(Math.sin(theta) * r));
            vertices.push(v.x, v.y, v.z);
        }
    }

    // 側面
    for (let i = 0; i < segments; i++) {
        for (let j = 0; j < radialSegments; j++) {
            const a = i * (radialSegments + 1) + j;
            const b = (i + 1) * (radialSegments + 1) + j;
            const c = (i + 1) * (radialSegments + 1) + (j + 1);
            const d = i * (radialSegments + 1) + (j + 1);
            indices.push(a, b, d, b, c, d);
        }
    }

    // 根元の蓋
    const centerStartIdx = vertices.length / 3;
    const centerStart = curve.getPointAt(0);
    vertices.push(centerStart.x, centerStart.y, centerStart.z);
    for (let j = 0; j < radialSegments; j++) indices.push(centerStartIdx, j + 1, j);

    // 先端の蓋
    const centerEndIdx = vertices.length / 3;
    const centerEnd = curve.getPointAt(1);
    vertices.push(centerEnd.x, centerEnd.y, centerEnd.z);
    const lastRingStart = segments * (radialSegments + 1);
    for (let j = 0; j < radialSegments; j++) indices.push(centerEndIdx, lastRingStart + j, lastRingStart + j + 1);

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geo.computeVertexNormals();
    geo.setIndex(indices);

    const mat = new THREE.MeshPhysicalMaterial({
        color: params.color,
        roughness: 0.5,
        metalness: 0.1,
        side: THREE.DoubleSide
    });

    return new THREE.Mesh(geo, mat);
}

function build() {
    while(hornGroup.children.length > 0) {
        const child = hornGroup.children[0];
        child.geometry.dispose();
        child.material.dispose();
        hornGroup.remove(child);
    }

    const L = params.size;
    const B = params.bend;

    // メインの角
    const mainCurve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(B * 0.4, L * 0.3, B * 0.1),
        new THREE.Vector3(B * 1.2, L * 0.7, B * 0.5),
        new THREE.Vector3(B * 1.5, L, 0)
    ]);
    const mainRadius = 0.22 * (L/10 + 0.7);
    hornGroup.add(createSolidHorn(mainCurve, mainRadius));

    // 分岐
    for (let i = 0; i < params.branches; i++) {
        const seed = i + L + B;
        const t = 0.3 + pseudoRandom(seed) * 0.5;
        const startP = mainCurve.getPointAt(t);
        const tangent = mainCurve.getTangentAt(t).normalize();
        
        // 付け根をボディの中心に寄せる
        const deepStartP = startP.clone().sub(tangent.clone().multiplyScalar(0.1));

        // メインに沿った短い分岐
        const branchCurve = new THREE.CatmullRomCurve3([
            deepStartP,
            startP.clone().add(tangent.clone().multiplyScalar(L * 0.15)).add(new THREE.Vector3(0.2, L * 0.05, 0.1)),
            startP.clone().add(tangent.clone().multiplyScalar(L * 0.25)).add(new THREE.Vector3(0.4, L * 0.15, (pseudoRandom(seed)-0.5)*0.3))
        ]);
        hornGroup.add(createSolidHorn(branchCurve, mainRadius * 0.5, true));
    }

    // 重心位置調整
    hornGroup.position.set(-(B * 0.5), -(L * 0.45), 0);
    controls.target.set(0, 0, 0); 
}

// UI Setup
['size', 'bend', 'texture', 'branches'].forEach(id => {
    document.getElementById(id).oninput = (e) => {
        params[id] = parseFloat(e.target.value);
        document.getElementById(id + 'V').innerText = params[id].toFixed(id==='branches'?0:1);
        build();
    };
});
document.getElementById('color').oninput = (e) => {
    params.color = e.target.value;
    build();
};

window.addEventListener('resize', () => {
    camera.aspect = viewer.clientWidth / viewer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
});

build();
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
