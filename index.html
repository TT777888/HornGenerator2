<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Realistic Horn Gen v2</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0c1016; color: #eee; overflow: hidden; }
        #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .panel { 
            background: rgba(20, 25, 35, 0.9); 
            padding: 25px; 
            border-right: 1px solid #444;
            z-index: 10;
            overflow-y: auto;
        }
        h1 { margin: 0 0 20px 0; font-size: 18px; letter-spacing: 2px; color: #fff; border-bottom: 1px solid #444; padding-bottom: 10px;}
        .field { margin-bottom: 22px; }
        label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #ccc; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #fff; }
        input[type=color] { width: 100%; height: 30px; border: 1px solid #444; background: none; cursor: pointer; }
        #viewer { width: 100%; height: 100%; position: relative; }
        .hint { font-size: 11px; color: #888; margin-top: 15px; line-height: 1.6; background: #1a1f26; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="app">
    <div class="panel">
        <h1>HORN GENERATOR</h1>
        
        <div class="field">
            <label>長さ (Size) <span id="sizeV">2.5</span></label>
            <input id="size" type="range" min="1" max="10" step="0.1" value="2.5">
        </div>

        <div class="field">
            <label>曲がり/ひねり (Twist) <span id="bendV">1.0</span></label>
            <input id="bend" type="range" min="0" max="5" step="0.05" value="1.0">
        </div>

        <div class="field">
            <label>節の深さ (Texture) <span id="textureV">0.2</span></label>
            <input id="texture" type="range" min="0" max="1" step="0.01" value="0.2">
        </div>

        <div class="field">
            <label>分岐 (Branches) <span id="branchesV">2</span></label>
            <input id="branches" type="range" min="0" max="5" step="1" value="2">
        </div>

        <div class="field">
            <label>色 (Base Color)</label>
            <input id="color" type="color" value="#ffffff">
        </div>

        <div class="hint">
            ・左ドラッグ: 回転<br>
            ・右ドラッグ: 平行移動<br>
            ・ホイール: <b>高速ズーム</b>
        </div>
    </div>
    <div id="viewer"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const viewer = document.getElementById("viewer");

const params = {
    size: 2.5,
    bend: 1.0,
    texture: 0.2,
    branches: 2,
    color: "#ffffff"
};

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c1016);

const camera = new THREE.PerspectiveCamera(45, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
camera.position.set(0, 2, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(viewer.clientWidth, viewer.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
viewer.appendChild(renderer.domElement);

// --- 操作の改善 ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.zoomSpeed = 2.5; // ズームを敏感に
controls.rotateSpeed = 1.0;

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(5, 10, 7);
scene.add(sun);
const fill = new THREE.PointLight(0xffffff, 0.8);
fill.position.set(-5, -2, 5);
scene.add(fill);

const hornGroup = new THREE.Group();
// 角全体を下げることで、画面中心に角のボディが来るように調整
hornGroup.position.y = -1.5; 
scene.add(hornGroup);

function createTaperedHorn(curve, baseRadius) {
    const segments = 80;
    const radialSegments = 16;
    const vertices = [];
    const indices = [];
    
    const frames = curve.computeFrenetFrames(segments, false);

    for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const taper = Math.pow(1 - t, 0.8); 
        const bump = 1 + Math.sin(t * 25) * (params.texture * 0.12) * (1-t);
        const r = baseRadius * taper * bump;

        const p = curve.getPointAt(t);
        const n = frames.normals[i];
        const b = frames.binormals[i];

        for (let j = 0; j <= radialSegments; j++) {
            const theta = (j / radialSegments) * Math.PI * 2;
            const x = Math.cos(theta) * r;
            const y = Math.sin(theta) * r;

            const v = new THREE.Vector3().copy(p)
                .add(n.clone().multiplyScalar(x))
                .add(b.clone().multiplyScalar(y));
            vertices.push(v.x, v.y, v.z);
        }
    }

    for (let i = 0; i < segments; i++) {
        for (let j = 0; j < radialSegments; j++) {
            const a = i * (radialSegments + 1) + j;
            const b = (i + 1) * (radialSegments + 1) + j;
            const c = (i + 1) * (radialSegments + 1) + (j + 1);
            const d = i * (radialSegments + 1) + (j + 1);
            indices.push(a, b, d, b, c, d);
        }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    const mat = new THREE.MeshPhysicalMaterial({
        color: params.color,
        roughness: 0.6,
        clearcoat: 0.1
    });

    return new THREE.Mesh(geo, mat);
}

function build() {
    while(hornGroup.children.length > 0) {
        const c = hornGroup.children[0];
        c.geometry.dispose();
        c.material.dispose();
        hornGroup.remove(c);
    }

    const L = params.size;
    const B = params.bend;

    // 【自由な曲がり】スパイラル構造のメインカーブ
    const points = [];
    for(let i=0; i<=10; i++) {
        const t = i/10;
        const angle = t * B * 2.5; // ひねり強度
        points.push(new THREE.Vector3(
            Math.cos(angle) * (t * B),
            t * L,
            Math.sin(angle) * (t * B)
        ));
    }
    const mainCurve = new THREE.CatmullRomCurve3(points);
    hornGroup.add(createTaperedHorn(mainCurve, 0.4));

    // 分岐
    for (let i = 0; i < params.branches; i++) {
        const startT = 0.2 + (i * 0.15);
        if(startT >= 0.9) break;
        
        const startP = mainCurve.getPointAt(startT);
        const bPoints = [];
        for(let j=0; j<=5; j++) {
            const bt = j/5;
            const bAngle = (startT + bt) * B * 2;
            bPoints.push(startP.clone().add(new THREE.Vector3(
                Math.cos(bAngle + i) * bt * B * 1.5,
                bt * L * 0.6,
                Math.sin(bAngle + i) * bt * B * 1.5
            )));
        }
        const branchCurve = new THREE.CatmullRomCurve3(bPoints);
        hornGroup.add(createTaperedHorn(branchCurve, 0.2));
    }
}

// UI更新
const ids = ['size', 'bend', 'texture', 'branches'];
ids.forEach(id => {
    document.getElementById(id).oninput = (e) => {
        params[id] = parseFloat(e.target.value);
        document.getElementById(id + 'V').innerText = params[id].toFixed(id==='branches'?0:1);
        build();
    };
});
document.getElementById('color').oninput = (e) => {
    params.color = e.target.value;
    build();
};

window.addEventListener('resize', () => {
    camera.aspect = viewer.clientWidth / viewer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
});

build();

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
