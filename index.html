<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Realistic Bio-Horn v4: Growth Wobble Edition</title>
    <style>
        :root { --accent: #c2a172; --bg: #0a0c10; --panel: #161a22; }
        body { margin: 0; font-family: 'Avenir', 'Helvetica Neue', sans-serif; background: var(--bg); color: #fff; overflow: hidden; }
        #app { display: grid; grid-template-columns: 340px 1fr; height: 100vh; }
        
        .panel { 
            background: var(--panel); padding: 30px; border-right: 1px solid #2a2f3a;
            display: flex; flex-direction: column; gap: 20px; overflow-y: auto;
        }
        h1 { font-size: 1.2rem; letter-spacing: 4px; color: var(--accent); border-bottom: 2px solid #333; padding-bottom: 10px; }
        .control-group { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; }
        label { font-size: 0.8rem; color: #888; display: flex; justify-content: space-between; margin-bottom: 8px; }
        .steps { display: flex; justify-content: space-between; font-size: 0.6rem; color: #444; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        input[type=color] { width: 100%; height: 40px; border: 1px solid #333; background: none; cursor: pointer; }
        
        #generate { 
            padding: 18px; background: var(--accent); color: #000; font-weight: 900; 
            border: none; border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        #generate:hover { background: #fff; letter-spacing: 2px; }

        #viewer { width: 100%; height: 100%; position: relative; }
        .tag { position: absolute; top: 20px; left: 20px; font-size: 0.6rem; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="app">
    <div class="panel">
        <h1>GENOTYPE-04</h1>
        
        <div class="control-group">
            <label>SIZE (1-5) <b id="val-size">3</b></label>
            <input id="size" type="range" min="1" max="5" step="1" value="3">
        </div>

        <div class="control-group">
            <label>CURVE (1-5) <b id="val-bend">3</b></label>
            <input id="bend" type="range" min="1" max="5" step="1" value="3">
        </div>

        <div class="control-group">
            <label>ROUGHNESS (1-5) <b id="val-texture">3</b></label>
            <input id="texture" type="range" min="1" max="5" step="1" value="3">
        </div>

        <div class="control-group">
            <label>BRANCH RATE (1-5) <b id="val-branches">1</b></label>
            <input id="branches" type="range" min="1" max="5" step="1" value="1">
        </div>

        <div class="control-group">
            <label>PIGMENT</label>
            <input id="color" type="color" value="#a68b6d">
        </div>

        <button id="generate">GENERATE NEW INDIVIDUAL</button>
    </div>

    <div id="viewer">
        <div class="tag">INDIVIDUAL SEED-BASED GROWTH ENGINE</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const viewer = document.getElementById("viewer");
let settings = { size: 3, bend: 3, texture: 3, branches: 1, color: "#a68b6d" };

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
camera.position.set(10, 6, 14);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(viewer.clientWidth, viewer.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
viewer.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lighting setup for depth
scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const sun = new THREE.DirectionalLight(0xffffff, 2.0);
sun.position.set(10, 15, 10);
scene.add(sun);
const rim = new THREE.PointLight(0xffffff, 3);
rim.position.set(-8, 2, -8);
scene.add(rim);

const hornGroup = new THREE.Group();
scene.add(hornGroup);

// --- 成長ゆらぎアルゴリズム ---
function growHorn(isBranch = false, startPos = new THREE.Vector3(), direction = new THREE.Vector3(0,1,0), scale = 1.0) {
    const group = new THREE.Group();
    const mat = new THREE.MeshPhysicalMaterial({
        color: settings.color,
        roughness: 0.8,
        metalness: 0.05,
    });

    const steps = 60 + (settings.size * 20);
    const baseR = (isBranch ? 0.12 : 0.45) * (settings.size * 0.15 + 0.6) * scale;
    
    let currentPos = startPos.clone();
    let currentDir = direction.clone().normalize();
    let drift = new THREE.Vector3(); // 成長の偏り

    // 個体差のためのシードに基づく初期値
    const individualDrift = (Math.random() - 0.5) * settings.bend * 0.1;

    for (let i = 0; i < steps; i++) {
        const t = i / steps;
        
        // 1. 先細りとテクスチャ（節）
        const taper = Math.pow(1 - t, 1.1);
        const ringFrequency = 12 + (settings.texture * 4);
        const bump = 1 + Math.sin(t * ringFrequency * Math.PI) * (settings.texture * 0.04) * (1 - t);
        const r = Math.max(0.01, baseR * taper * bump);

        // 2. ディスク生成（滑らかに繋ぐために高密度化）
        const discGeo = new THREE.CylinderGeometry(r * 0.99, r, 0.15, 24);
        const disc = new THREE.Mesh(discGeo, mat);
        
        disc.position.copy(currentPos);
        const quaternion = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), currentDir);
        disc.quaternion.copy(quaternion);

        // 個体差：各節ごとにランダムな角度の微調整
        disc.rotateX((Math.random() - 0.5) * 0.05);
        disc.rotateZ((Math.random() - 0.5) * 0.05);
        
        group.add(disc);

        // 3. 次の成長ベクトル（ここが個体差の肝）
        // settings.bendが大きいほど、ドリフト（迷走）が激しくなる
        const noise = new THREE.Vector3(
            (Math.random() - 0.5) * 0.05 * settings.bend,
            0.02,
            (Math.random() - 0.5) * 0.05 * settings.bend
        );
        
        // メインの曲がりカーブ
        const curveVec = new THREE.Vector3(individualDrift + settings.bend * 0.015, 0.1, 0);
        
        currentDir.add(noise).add(curveVec).normalize();
        currentPos.add(currentDir.clone().multiplyScalar(0.12)); // 重なりを深くして隙間を消す
    }

    return { group, points: group.children.map(c => c.position) };
}

function build() {
    while(hornGroup.children.length > 0) {
        const c = hornGroup.children[0];
        c.traverse(node => {
            if (node.geometry) node.geometry.dispose();
            if (node.material) node.material.dispose();
        });
        hornGroup.remove(c);
    }

    // メインの角を生成
    const main = growHorn(false, new THREE.Vector3(0,0,0), new THREE.Vector3(0,1,0));
    hornGroup.add(main.group);

    // リアルな分岐：メインの「節」から成長方向に合わせて生やす
    const branchFactor = settings.branches - 1;
    if (branchFactor > 0) {
        for (let i = 0; i < branchFactor; i++) {
            // 分岐位置をメインの40%〜80%の間にランダムに設定
            const splitIdx = Math.floor(main.group.children.length * (0.3 + Math.random() * 0.4));
            const startP = main.group.children[splitIdx].position;
            
            // 分岐の方向：メインの方向から大きく外れる（個体差大）
            const outDir = new THREE.Vector3(
                1.5 + Math.random(), 
                0.5 + Math.random(), 
                (Math.random() - 0.5) * 2
            ).normalize();
            
            const branch = growHorn(true, startP, outDir, 0.55);
            hornGroup.add(branch.group);
        }
    }

    // 重心を中心に
    const box = new THREE.Box3().setFromObject(hornGroup);
    const center = box.getCenter(new THREE.Vector3());
    hornGroup.position.set(-center.x, -center.y, -center.z);
}

// UI Setup
['size', 'bend', 'texture', 'branches'].forEach(id => {
    const el = document.getElementById(id);
    el.oninput = (e) => {
        settings[id] = parseInt(e.target.value);
        document.getElementById(`val-${id}`).innerText = settings[id];
        build();
    };
});
document.getElementById('color').oninput = (e) => {
    settings.color = e.target.value;
    build();
};
document.getElementById('generate').onclick = () => build();

window.addEventListener('resize', () => {
    camera.aspect = viewer.clientWidth / viewer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
});

build();
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
